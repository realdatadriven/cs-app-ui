<!doctype html>
<html
	lang="en"
	class="bg-cover"
	style="
		background-image: url(https://images.unsplash.com/photo-1557672172-298e090bd0f1?fit=crop&q=100&w=2071);
	">
	<head>
		<meta charset="utf-8" />
		<title>Login 4</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link href="./output.css" rel="stylesheet" />
		<script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.0/dist/iconify-icon.min.js"></script>
	</head>
	<body class="flex min-h-screen items-center justify-center">
		<div
			class="to-base-100/60 from-base-100 border-base-100/20 relative w-full max-w-md rounded-2xl border-[0.5px] bg-radial-[at_50%_0%] p-8 shadow-2xl outline outline-black/5 backdrop-blur-lg">
			<!-- Tabs -->
			<div class="mb-8 flex justify-center">
				<div class="tabs tabs-box bg-base-content/5 inline-flex">
					<a href="#" class="tab">Sign up</a>
					<a href="#" class="tab tab-active">Sign in</a>
				</div>
			</div>

			<!-- Title -->
			<h2 class="text-base-content mb-6 text-2xl font-bold">Sign in to your account</h2>

			<!-- Form -->
			<form class="flex flex-col gap-4">
				<div>
					<label class="input has-user-invalid:validator w-full">
						<iconify-icon icon="mdi:email-outline" width="20" height="20"></iconify-icon>
						<input type="email" placeholder="Your email" class="flex-1 bg-transparent" required />
					</label>
					<div class="validator-hint hidden">Enter valid email address</div>
				</div>
				<div>
					<label class="input has-user-invalid:validator w-full">
						<iconify-icon icon="mdi:lock-outline" width="20" height="20"></iconify-icon>
						<input
							type="password"
							placeholder="Password"
							class="flex-1 bg-transparent"
							required
							minlength="8"
							pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
							title="Must be more than 8 characters, including number, lowercase letter, uppercase letter" />
						<button
							type="button"
							tabindex="-1"
							class="btn btn-ghost btn-square btn-sm"
							aria-label="Show password"
							onclick="this.previousElementSibling.type = this.previousElementSibling.type === 'password' ? 'text' : 'password'; this.querySelector('iconify-icon').setAttribute('icon', this.previousElementSibling.type === 'password' ? 'mdi:eye-outline' : 'mdi:eye-off-outline');">
							<iconify-icon icon="mdi:eye-outline" width="20" height="20"></iconify-icon>
						</button>
					</label>
					<div class="validator-hint hidden">Invalid password</div>
				</div>
				<div class="flex items-center justify-between text-sm">
					<label class="flex items-center gap-2">
						<input type="checkbox" class="toggle toggle-xs" />
						<span class="text-xs opacity-60">Remember me</span>
					</label>
					<a href="#" class="link link-hover">Forgot Password?</a>
				</div>
				<button class="btn btn-neutral btn-block mt-2 h-12 text-base font-semibold">Sign in</button>
			</form>

			<!-- Divider -->
			<div class="my-6 flex items-center">
				<div class="bg-base-200 h-px flex-1"></div>
				<span class="text-base-content/60 px-3 text-sm">or sign in with</span>
				<div class="bg-base-200 h-px flex-1"></div>
			</div>

			<!-- Social Buttons -->
			<div class="mb-6 grid grid-cols-3 gap-4">
				<button
					class="btn btn-block border-base-200 flex items-center justify-center gap-2 border bg-white text-black"
					aria-label="Sign in with Google">
					<iconify-icon icon="logos:google-icon" width="24" height="24"></iconify-icon>
				</button>
				<button
					class="btn btn-block border-base-200 flex items-center justify-center gap-2 border bg-white text-black"
					aria-label="Sign in with Apple">
					<iconify-icon icon="mdi:apple" width="24" height="24"></iconify-icon>
				</button>
				<button
					class="btn btn-block border-base-200 flex items-center justify-center gap-2 border bg-white text-black"
					aria-label="Sign in with GitHub">
					<iconify-icon icon="mdi:github" width="24" height="24"></iconify-icon>
				</button>
			</div>

			<!-- Terms -->
			<p class="text-base-content/60 mt-2 text-center text-xs">
				By signing in, you agree to our
				<a href="#" class="link">Terms & Service</a>
			</p>
		</div>

		<label class="swap btn btn-sm btn-circle swap-rotate absolute start-4 top-4">
			<!-- this hidden checkbox controls the state -->
			<input type="checkbox" class="theme-controller" value="night" />

			<!-- sun icon -->
			<svg
				class="swap-off size-4 fill-current"
				xmlns="http://www.w3.org/2000/svg"
				viewBox="0 0 24 24">
				<path
					d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z" />
			</svg>

			<!-- moon icon -->
			<svg
				class="swap-on size-4 fill-current"
				xmlns="http://www.w3.org/2000/svg"
				viewBox="0 0 24 24">
				<path
					d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z" />
			</svg>
		</label>
	</body>
</html>
