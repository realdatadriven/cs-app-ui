<!doctype html>
<html
	lang="en"
	class="bg-cover"
	style="
		background-image: url(https://images.unsplash.com/photo-1557672172-298e090bd0f1?fit=crop&q=100&w=2071);
	">
	<head>
		<meta charset="utf-8" />
		<title>Login 3</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link href="./output.css" rel="stylesheet" />
		<script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.0/dist/iconify-icon.min.js"></script>
	</head>
	<body class="flex min-h-screen items-center justify-center">
		<div
			class="bg-base-300/40 flex w-full max-w-5xl items-center justify-center backdrop-blur-md md:my-4 md:rounded-3xl md:p-4">
			<div
				class="md:rounded-box bg-base-100 flex w-full overflow-hidden shadow-lg max-md:flex-col-reverse">
				<!-- Left: Login Form -->
				<div class="flex flex-1 flex-col justify-center px-12 py-20">
					<form class="w-full">
						<div class="mb-4">
							<label class="input input-bordered has-user-invalid:validator w-full">
								<iconify-icon icon="mdi:email-outline" width="20" height="20"></iconify-icon>
								<input
									id="email"
									type="email"
									required
									placeholder="Enter your email"
									autocomplete="on" />
							</label>
							<div class="validator-hint hidden">Enter valid email address</div>
						</div>
						<div class="mb-2">
							<label class="input input-bordered has-user-invalid:validator w-full">
								<iconify-icon icon="mdi:lock-outline" width="20" height="20"></iconify-icon>
								<input
									id="password"
									type="password"
									required
									placeholder="Enter your Password"
									minlength="8"
									pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).&#123;8,}"
									title="Must be more than 8 characters, including number, lowercase letter, uppercase letter" />
								<button
									type="button"
									tabindex="-1"
									class="btn btn-ghost btn-square btn-sm"
									aria-label="Show password"
									onclick="document.getElementById('password').type = document.getElementById('password').type === 'password' ? 'text' : 'password'; this.querySelector('iconify-icon').setAttribute('icon', document.getElementById('password').type === 'password' ? 'mdi:eye-off-outline' : 'mdi:eye-outline');">
									<iconify-icon icon="mdi:eye-off-outline" width="20" height="20"></iconify-icon>
								</button>
							</label>
							<p class="validator-hint hidden">Invalid password</p>
						</div>
						<div class="mb-6 flex items-center justify-between text-sm">
							<label class="flex items-center gap-2">
								<input type="checkbox" class="toggle toggle-sm" />
								Remember me
							</label>
							<a href="#" class="link link-hover">Forgot Password</a>
						</div>
						<button type="submit" class="btn btn-success btn-block mb-4">Sign In</button>
						<div class="divider">OR</div>
						<div class="mb-4 text-center text-sm">
							Don't have an account yet?
							<a href="#" class="link link-hover font-medium">Sign Up</a>
						</div>
						<div class="space-y-3">
							<button
								type="button"
								class="btn btn-block border-base-300 text-base-content flex items-center justify-center gap-2 border">
								<iconify-icon
									icon="material-icon-theme:google"
									width="20"
									height="20"></iconify-icon>
								Sign In with Google
							</button>
							<button type="button" class="btn btn-block flex items-center justify-center gap-2">
								<iconify-icon
									icon="ic:baseline-apple"
									width="20"
									height="20"
									color="red"></iconify-icon>
								Sign in with Apple
							</button>
						</div>
					</form>
				</div>
				<!-- Right: Image Section -->
				<div class="bg-base-200 flex flex-1 flex-col justify-end p-6">
					<div class="my-8 flex flex-col">
						<h1 class="mb-2 text-lg font-semibold md:text-4xl lg:text-5xl lg:opacity-40">
							Welcome Back
						</h1>
						<p class="text-base-content/60 text-base">Please enter your details to sign in.</p>
					</div>
					<div
						class="flex aspect-square w-full items-center justify-center rounded-4xl bg-cover bg-center max-md:hidden"
						style="
							background-image: url(https://images.unsplash.com/photo-1543269665-7821011040ee?fit=crop&w=1200&q=100);
						"></div>
				</div>
			</div>
		</div>

		<label class="swap btn btn-sm btn-circle swap-rotate absolute start-4 top-4">
			<!-- this hidden checkbox controls the state -->
			<input type="checkbox" class="theme-controller" value="night" />

			<!-- sun icon -->
			<svg
				class="swap-off size-4 fill-current"
				xmlns="http://www.w3.org/2000/svg"
				viewBox="0 0 24 24">
				<path
					d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z" />
			</svg>

			<!-- moon icon -->
			<svg
				class="swap-on size-4 fill-current"
				xmlns="http://www.w3.org/2000/svg"
				viewBox="0 0 24 24">
				<path
					d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z" />
			</svg>
		</label>
	</body>
</html>
