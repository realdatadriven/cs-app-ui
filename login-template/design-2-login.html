<!doctype html>
<html
	lang="en"
	class="bg-cover"
	style="
		background-image: url(https://images.unsplash.com/photo-1508163223045-1880bc36e222?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&q=80&w=2071);
	">
	<head>
		<meta charset="utf-8" />
		<title>Login 2</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link href="./output.css" rel="stylesheet" />
		<script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.0/dist/iconify-icon.min.js"></script>
	</head>
	<body class="flex min-h-screen items-center justify-center p-4">
		<div class="card bg-base-100 border-base-200 w-full max-w-100 border p-12 shadow-lg">
			<!-- Header -->
			<h1 class="mb-2 text-center text-3xl font-bold">Welcome back</h1>
			<p class="text-base-content/70 mb-6 text-center">Sign in to your account to continue</p>

			<!-- Social Login Buttons -->
			<div class="grid grid-cols-2 gap-2">
				<button class="btn border-[#e5e5e5] bg-white text-black">
					<svg
						aria-label="Google logo"
						width="16"
						height="16"
						xmlns="http://www.w3.org/2000/svg"
						viewBox="0 0 512 512">
						<g>
							<path d="m0 0H512V512H0" fill="#fff"></path>
							<path fill="#34a853" d="M153 292c30 82 118 95 171 60h62v48A192 192 0 0190 341"></path>
							<path fill="#4285f4" d="m386 400a140 175 0 0053-179H260v74h102q-7 37-38 57"></path>
							<path fill="#fbbc02" d="m90 341a208 200 0 010-171l63 49q-12 37 0 73"></path>
							<path
								fill="#ea4335"
								d="m153 219c22-69 116-109 179-50l55-54c-78-75-230-72-297 55"></path>
						</g>
					</svg>
					Google
				</button>
				<button class="btn border-black bg-black text-white">
					<svg
						aria-label="GitHub logo"
						width="16"
						height="16"
						xmlns="http://www.w3.org/2000/svg"
						viewBox="0 0 24 24">
						<path
							fill="white"
							d="M12,2A10,10 0 0,0 2,12C2,16.42 4.87,20.17 8.84,21.5C9.34,21.58 9.5,21.27 9.5,21C9.5,20.77 9.5,20.14 9.5,19.31C6.73,19.91 6.14,17.97 6.14,17.97C5.68,16.81 5.03,16.5 5.03,16.5C4.12,15.88 5.1,15.9 5.1,15.9C6.1,15.97 6.63,16.93 6.63,16.93C7.5,18.45 8.97,18 9.54,17.76C9.63,17.11 9.89,16.67 10.17,16.42C7.95,16.17 5.62,15.31 5.62,11.5C5.62,10.39 6,9.5 6.65,8.79C6.55,8.54 6.2,7.5 6.75,6.15C6.75,6.15 7.59,5.88 9.5,7.17C10.29,6.95 11.15,6.84 12,6.84C12.85,6.84 13.71,6.95 14.5,7.17C16.41,5.88 17.25,6.15 17.25,6.15C17.8,7.5 17.45,8.54 17.35,8.79C18,9.5 18.38,10.39 18.38,11.5C18.38,15.32 16.04,16.16 13.81,16.41C14.17,16.72 14.5,17.33 14.5,18.26C14.5,19.6 14.5,20.68 14.5,21C14.5,21.27 14.66,21.59 15.17,21.5C19.14,20.16 22,16.42 22,12A10,10 0 0,0 12,2Z"></path>
					</svg>
					GitHub
				</button>
			</div>

			<!-- Divider -->
			<div class="my-4 flex items-center">
				<div class="bg-base-200 h-px flex-1"></div>
				<span class="text-base-content/60 px-3 text-sm">Or continue with email</span>
				<div class="bg-base-200 h-px flex-1"></div>
			</div>

			<!-- Email and Password Form -->
			<form class="flex flex-col gap-4">
				<div>
					<label class="input input-bordered has-user-invalid:validator">
						<iconify-icon icon="mdi:email-outline" width="20" height="20"></iconify-icon>
						<input type="email" required placeholder="you@example.com" autocomplete="on" />
					</label>
					<div class="validator-hint hidden">Enter valid email address</div>
				</div>
				<div>
					<label class="input input-bordered has-user-invalid:validator">
						<iconify-icon icon="mdi:lock-outline" width="20" height="20"></iconify-icon>
						<input
							type="password"
							required
							placeholder="Password"
							minlength="8"
							pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).&#123;8,}"
							title="Must be more than 8 characters, including number, lowercase letter, uppercase letter" />
						<button
							type="button"
							tabindex="-1"
							class="btn btn-ghost btn-square btn-sm"
							aria-label="Show password">
							<iconify-icon icon="mdi:eye-outline" width="20" height="20"></iconify-icon>
						</button>
					</label>
					<p class="validator-hint hidden">
						Must be more than 8 characters, including
						<br />
						At least one number
						<br />
						At least one lowercase letter
						<br />
						At least one uppercase letter
					</p>
				</div>

				<div class="flex items-center justify-between">
					<label class="has-user-invalid:validator flex cursor-pointer items-center gap-2">
						<input type="checkbox" class="checkbox checkbox-sm" />
						<span class="text-sm">Remember me</span>
					</label>
					<a class="link text-sm" href="#">Forgot password?</a>
				</div>

				<button class="btn btn-block mt-2 h-10 text-[14px] font-semibold">Sign in</button>
			</form>

			<!-- Footer -->
			<div class="text-base-content/70 mt-6 text-center text-xs">
				Don't have an account?
				<a class="link link-info font-medium" href="#">Sign up</a>
			</div>
		</div>
	</body>

	<!-- theme controller -->

	<label class="swap btn btn-sm btn-circle swap-rotate absolute start-4 top-4">
		<!-- this hidden checkbox controls the state -->
		<input type="checkbox" class="theme-controller" value="night" />

		<!-- sun icon -->
		<svg
			class="swap-off size-4 fill-current"
			xmlns="http://www.w3.org/2000/svg"
			viewBox="0 0 24 24">
			<path
				d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z" />
		</svg>

		<!-- moon icon -->
		<svg class="swap-on size-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
			<path
				d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z" />
		</svg>
	</label>
</html>
